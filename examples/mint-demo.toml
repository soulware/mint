# Minimal demo config (docs/design-mint.md § "Reference client & demo").
#
# Two roles spanning both caveat provenances. A `{{caveat.X}}` is either
# issuer-stamped (a reserved name like `sub`, set by mint) or attested (any
# other name: the caller proposes it and the attestation authority vouches it
# before it bakes in). `demo` is issuer-only — it binds just `sub`, so it
# needs no authority and exchanges in one step. `demo-attested` binds the
# non-reserved `bucket` and `project`, so its credential carries an attested
# third-party caveat the demo authority discharges at exchange. Both also use
# the mint-computed `{{mint.expiry}}`.
#
# The per-role policy templates live under roles_dir (examples/demo_roles/).
# Provenance is derived from the template. A true deployment constant is
# written into the policy JSON as a literal.
#
# `mint serve` always talks to a real S3-compatible backend (Tigris,
# MinIO, AWS). Set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in the
# environment before starting, and point `store.bucket` at a bucket you own.

audience = "mint"

# data_dir defaults to mint_data, roles_dir to mint_roles, each resolved
# against the working directory (not this file's parent); an absolute
# path is used verbatim. roles_dir is set so the demo runs from mint/:
roles_dir = "examples/demo_roles"
# data_dir = "mint_data"
# Each role's template defaults to <roles_dir>/<name>.json (demo ->
# examples/demo_roles/demo.json); set policy_file only to override.

# Lifetime (seconds) of the credential ticket a client gets at enroll and
# presents at exchange. Multi-use within this window; defaults to 86400
# (24h). Must be > 0.
# ticket_ttl_seconds = 86400

# Listener transport (docs/design-mint.md § "Transport"). `bind` and
# `socket` are mutually exclusive. The bundled single-host dev shape
# (client + mint co-resident) uses the UDS listener:
socket = "mint_data/mint.sock"
# For a TCP listener instead, replace the line above with:
#   bind = "127.0.0.1:8085"

[auth]
# Discharge URL for the enroll/exchange/admin gates. Required, or the
# enrollment and admin planes are disabled.
location = "https://auth.elide.internal/v1/discharge"

# Colocate the auth role on a UDS instead of a separate auth-service.
# Demo / single-host only; omit for production.
[auth.demo]
enabled = true
# Defaults to <data_dir>/auth.sock; ignored when enabled = false.
socket = "mint_data/auth.sock"

[attestation]
# Discharge URL for the attested caveat of any [role.attestation] role.
location = "https://attest.elide.internal/v1/discharge"

# Colocate the attestation authority on a UDS. Demo / single-host only;
# requires [auth.demo]. Omit for production.
[attestation.demo]
enabled = true
# Defaults to <data_dir>/attest.sock; ignored when enabled = false.
socket = "mint_data/attest.sock"

# Where mint keeps its own enrollment state (`_mint/*`). Operational
# only — not a template surface.
[store]
bucket = "mint-demo"
# endpoint = "https://t3.storage.dev"   # default; set for non-Tigris S3
# region   = "us-east-1"                # default

# A policy template pulls from two namespaces — `{{caveat.X}}` (MAC-verified)
# and `{{mint.X}}` (mint-computed) — plus literal text for true deployment
# constants. A `{{caveat.X}}` value reaches the credential by one of two
# provenances, derived from the name:
#   - issuer-stamped — a reserved name (e.g. `sub`) mint sets from the
#                      principal.
#   - attested       — any other name: the caller proposes it at exchange
#                      (`--caveat X=V`) and the attestation authority vouches
#                      it before it bakes in.
# The two roles below cover both.

# `demo` — issuer-only. Its template binds only the reserved, issuer-stamped
# `sub`, so it needs no attestation authority and exchanges in one step. The
# credential is scoped to the caller's own `sub` prefix in a fixed (literal)
# bucket.
#   mint client exchange demo
[[role]]
name = "demo"
# Credential lifetime in seconds, clamped to the `exp` the caller attenuated
# onto its credential — a caller can ask for less, never more.
ttl_seconds = 900

# `demo-attested` — attested. Its template binds the non-reserved `bucket`
# and `project`; the caller proposes both at exchange and the attestation
# authority vouches them before they bake into the credential. Any
# non-reserved caveat makes a role attested.
#   mint client exchange --caveat bucket=acme-data --caveat project=apollo demo-attested
[[role]]
name = "demo-attested"
ttl_seconds = 300
# Attested roles exchange via a durable (no-`exp`) intermediate that the
# holder finalizes per-use — e.g. a coordinator minting a credential per
# volume.
