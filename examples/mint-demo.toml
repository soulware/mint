# Minimal demo config (docs/design-mint.md § "Reference client & demo").
#
# Two roles, together exercising every template namespace. `demo` is a
# plain key-bound role over a single server-side {{env.prefix}} ({{env.X}}
# + {{mint.expiry}} only, no contract, no TPC). `demo-attested` adds the
# caveat and attestation namespaces: its policy substitutes {{caveat.sub}}
# (MAC-verified) and {{attested.project}}, and its credential carries an
# attested third-party caveat, so assume-role is refused until the client
# fetches a discharge from the demo attestation authority. This is NOT the
# Elide role inventory (see mint-elide.toml for that).
# Each role's policy template lives under roles_dir (examples/demo_roles/).
#
# `mint serve` always talks to a real S3-compatible backend (Tigris,
# MinIO, AWS). Set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in the
# environment before starting, and point `store.bucket` / `env.bucket`
# at a bucket you own.

audience = "mint"

# data_dir defaults to mint_data, roles_dir to mint_roles, each resolved
# against the working directory (not this file's parent); an absolute
# path is used verbatim. roles_dir is set so the demo runs from mint/:
roles_dir = "examples/demo_roles"
# data_dir = "mint_data"
# Each role's template defaults to <roles_dir>/<name>.json (demo ->
# examples/demo_roles/demo.json); set policy_file only to override.

# Listener transport (docs/design-mint.md § "Transport"). `bind` and
# `socket` are mutually exclusive. The bundled single-host dev shape
# (coordinator + mint co-resident) uses the UDS listener:
socket = "mint_data/mint.sock"
# For a TCP listener instead, replace the line above with:
#   bind = "127.0.0.1:8085"

[auth]
# Discharge URL for the enroll/exchange/admin gates. Required, or the
# enrollment and admin planes are disabled.
location = "https://auth.elide.internal/v1/discharge"

# Colocate the auth role on a UDS instead of a separate auth-service.
# Demo / single-host only; omit for production.
[auth.demo]
enabled = true
# Defaults to <data_dir>/auth.sock; ignored when enabled = false.
socket = "mint_data/auth.sock"

[attestation]
# Discharge URL for the attested caveat of any [role.attestation] role.
location = "https://attest.elide.internal/v1/discharge"

# Colocate the attestation authority on a UDS. Demo / single-host only;
# requires [auth.demo]. Omit for production.
[attestation.demo]
enabled = true
# Defaults to <data_dir>/attest.sock; ignored when enabled = false.
socket = "mint_data/attest.sock"

# Where mint keeps its own enrollment state (`_mint/*`). Operational
# only — not a template surface.
[store]
bucket = "mint-demo"
# endpoint = "https://t3.storage.dev"   # default; set for non-Tigris S3
# region   = "us-east-1"                # default

# Values surfaced to role policy templates as `{{env.X}}`. Flat scalars
# only; nested tables/arrays are rejected. The demo roles reference
# `{{env.bucket}}` and `{{env.prefix}}` — both reach a template only by
# being restated here.
[env]
bucket = "mint-demo"
prefix = "demo"

# Every template value is MAC-verified or server-side — there is no
# self-asserted request scoping. `demo` references only `{{env.X}}` and
# `{{mint.expiry}}`, so it needs no `[role.template]` contract;
# `demo-attested` declares its caveat/attested contract below.

[[role]]
name = "demo"
min_ttl_seconds = 60
max_ttl_seconds = 3600
default_ttl_seconds = 900

[[role]]
name = "demo-attested"
min_ttl_seconds = 60
max_ttl_seconds = 900
default_ttl_seconds = 300

[role.template]
caveat = ["sub"]
attested = ["project"]

# Marks the role: its credential carries an attested third-party caveat
# at attestation_location. The opaque `mode` is sealed into the caveat
# for the attestation authority; it defaults to the role name, set it
# only to use a distinct name for role vs mode.
[role.attestation]
# mode = "demo-attested"
