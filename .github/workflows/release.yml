name: release

# Build the `mint` release binary and publish it as a GitHub Release asset on a
# `v*` tag push. Downstream deployments (e.g. elide's deploy/mint image) pull
# this prebuilt artifact at a pinned tag; the published .sha256 backs an optional
# transit-corruption check.
#
# This is a deliberately generic, copy-able shape: the only repo-specific bits
# are BIN (the binary name) and the build matrix. The same workflow is intended
# to be lifted into the elide repo for its binaries — extend BIN to a loop or
# add matrix targets there.
#
# A tag points at a commit `ci.yml` already validated on its PR to main, so this
# workflow builds and ships.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN: mint

jobs:
  build:
    strategy:
      matrix:
        include:
          # Built on ubuntu-24.04 so the glibc the binary links against matches
          # the ubuntu:24.04 runtime image the deploy Dockerfile runs it on.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mint-release-${{ matrix.target }}

      # --locked builds against the committed Cargo.lock so the released binary
      # is reproducible from the tagged tree. MINT_RELEASE_VERSION carries the
      # tag, which build.rs bakes into `mint --version` — making the tag the
      # version's single source of truth.
      - name: Build
        env:
          MINT_RELEASE_VERSION: ${{ github.ref_name }}
        run: cargo build --release --locked --bin "$BIN" --target ${{ matrix.target }}

      - name: Smoke-test the binary
        run: |
          bin=./target/${{ matrix.target }}/release/"$BIN"
          "$bin" --help
          # The baked version must match the tag (minus the leading v).
          want="${GITHUB_REF_NAME#v}"
          got="$("$bin" --version)"
          echo "reported: $got"
          case "$got" in
            *"$want"*) echo "version matches the tag" ;;
            *) echo "::error::'$got' does not contain tag version '$want'"; exit 1 ;;
          esac

      # Name the asset by target triple so the consumer's download URL is stable
      # across releases; the tag carries the version. The .sha256 uses the
      # asset's own name, so `sha256sum -c` passes against the file the consumer
      # downloads under the same name.
      - name: Stage artifact + checksum
        run: |
          asset="$BIN-${{ matrix.target }}"
          install -m 0755 "target/${{ matrix.target }}/release/$BIN" "$asset"
          sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      # Idempotent: the first matrix job creates the Release, later ones reuse
      # it. --clobber lets a re-run of the same tag replace its assets.
      - name: Publish to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A semver pre-release tag carries a hyphen (v1.2.3-rc1, -alpha, …);
          # publish those as a GitHub pre-release, keeping them off the "Latest"
          # badge. A plain vX.Y.Z is a final release.
          extra=""
          case "$GITHUB_REF_NAME" in *-*) extra="--prerelease" ;; esac
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $extra
          gh release upload "$GITHUB_REF_NAME" "$ASSET" "$ASSET.sha256" --clobber
